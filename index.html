<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>Gothic Lockpicker</title>
    <link href="icon.png" rel="icon">
    <style>
        :root {
            --block-scale: 1;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: orange;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #1a1a1a;
            padding: 20px;
            border: 1px solid #333;
            border-radius: 8px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            width: calc(100vw - 40px);
            max-width: 400px;
            box-sizing: border-box;
            font-size: 17px;
        }

        .controls-item {
            margin-bottom: 15px;
        }

        .dynamic-control {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            margin-top: 0;
            transition: max-height 0.4s ease-out, opacity 0.3s ease-out, margin-top 0.4s ease-out;
        }

        .dynamic-control.show-stretch {
            max-height: 200px;
            opacity: 1;
            margin-top: 15px;
        }

        #countInput {
            font-size: 17px;
        }

        .controls label:not(.toggle-label) {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            font-size: 17px;
            gap: 8px;
            color: #ccc;
        }

        .toggle-label {
            display: flex;
            flex-direction: row;
            align-items: center;
            font-size: 13px;
            gap: 8px;
            color: #ccc;
            cursor: pointer;
        }

        .toggle-label input {
            cursor: pointer;
            width: 16px;
            height: 16px;
            margin: 0;
        }

        .controls input[type="range"], .controls input[type="number"] {
            cursor: pointer;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 5px;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        .number-control {
            display: flex;
            align-items: center;
            gap: 4px;
            width: 100%;
            flex-wrap: nowrap;
            min-width: 0;
        }

        .num-btn {
            background: #333;
            color: #fff;
            border: 1px solid #444 !important;
            border-radius: 4px;
            width: 32px;
            height: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1;
            padding: 0 !important;
        }

        .num-btn:active, .controls button:active {
            background: #222;
        }

        .number-control input[type="number"] {
            -moz-appearance: textfield;
            text-align: center;
            width: 100%;
        }

        .number-control input[type="number"]::-webkit-inner-spin-button, .number-control input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .controls button {
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #333;
            color: white;
            font-weight: bold;
            transition: background 0.2s;
            font-size: 17px;
        }

        .controls button:disabled {
            background: #222;
            color: #666;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .number-control button {
            width: 80%;
        }

        .action-row {
            display: flex;
            flex-direction: row;
            gap: 10px;
            width: 100%;
            align-items: stretch;
        }

        #resetBtn {
            flex: 0 0 44px;
            padding: 0;
            margin: 0;
            font-size: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #333;
        }

        #solveBtn {
            flex: 1;
            height: 44px;
            margin: 0;
            font-weight: bold;
            background: orange;
            border-color: #357abd;
            color: #111;
        }

        #solveBtn:active:not(:disabled) {
            background: #e59400;
        }

        .play-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .play-status-row.show-stretch {
            min-height: 30px;
        }

        .playback-controls {
            display: flex;
        }

        .play-status-row button, .step-controls-row button {
            padding: 6px 15px;
            font-size: 14px;
            background: #66d437;
            color: #111;
            flex-shrink: 0;
        }

        #restartSeqBtn {
            display: none;
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
            border-right: none;
            padding-left: 10px;
            padding-right: 10px;
        }

        #playBtn {
            display: none;
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }

        .step-controls-row {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .step-controls-row.is-expanded-parent {
            max-height: 1000px !important;
            transition: max-height 0.3s ease-out;
        }

        .status-message {
            font-size: 13px;
            font-weight: bold;
        }

        .status-error {
            color: #ff4444;
        }

        .status-success {
            color: #66d437;
        }

        .status-info {
            color: #37a1d4;
        }

        .solution-list {
            flex-grow: 1;
            background: #222;
            border: 1px solid #444;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            padding: 10px;
            height: 120px;
            max-height: 120px;
            overflow-y: auto !important;
            font-size: 13px;
            font-family: monospace;
            transition: height 0.3s ease-out, max-height 0.3s ease-out;
        }

        .solution-list div {
            padding: 4px 5px;
            border-bottom: 1px solid #333;
            transition: background 0.2s, color 0.2s;
            border-radius: 3px;
            box-sizing: border-box;
        }

        .solution-list div:last-child {
            border-bottom: none;
        }

        .solution-list div.active-step {
            background: rgba(102, 212, 55, 0.2);
            color: #7aef48;
            font-weight: bold;
        }

        .solution-list div:hover:not(.active-step) {
            background: rgba(255, 255, 255, 0.1);
        }

        .expand-list-item {
            display: block;
            width: 100%;
            background: #2a2a2a;
            color: #888;
            border: 1px solid #444;
            border-top: 1px solid #111;
            padding: 6px 0;
            margin: 0;
            font-size: 12px;
            font-family: monospace;
            font-weight: bold;
            cursor: text-align: center;
            border-radius: 0 0 4px 4px;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .expand-list-item:active {
            background: #3a3a3a;
            color: #fff;
        }

        .scene {
            position: relative;
            left: 150px;
            perspective: 1200px;
        }

        .lock-mechanism {
            position: relative;
            width: 340px;
            height: 200px;
            transform-style: preserve-3d;
            transform: scale(var(--block-scale)) rotateX(-30deg) rotateY(-40deg) rotateZ(0deg);
            transition: transform 0.2s ease-out;
        }

        .plate {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.2s ease-out;
            cursor: grab;
            touch-action: none;
        }

        .plate:active {
            cursor: grabbing;
        }

        .front-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2a2a2a, #111);
            border: 5px solid #999;
            border-radius: 30px;
            box-sizing: border-box;
            transform: translateZ(12px);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .top-face, .bottom-face {
            position: absolute;
            left: 30px;
            width: calc(100% - 60px);
            height: 24px;
            background: #777;
            box-sizing: border-box;
        }

        .top-face {
            top: 0;
            transform-origin: top;
            transform: translateZ(12px) rotateX(-90deg);
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            transform-style: preserve-3d;
        }

        .bottom-face {
            bottom: 0;
            transform-origin: bottom;
            transform: translateZ(12px) rotateX(90deg);
        }

        .right-face, .left-face {
            position: absolute;
            top: 29px;
            width: 24px;
            height: calc(100% - 60px);
            background: #777;
            box-sizing: border-box;
        }

        .right-face {
            right: 0;
            border-right: 1px solid #777;
            transform-origin: right;
            transform: translateZ(-11px) rotateY(90deg);
        }

        .left-face {
            left: 0;
            border-left: 1px solid #777;
            transform-origin: left;
            transform: translateZ(-11px) rotateY(-90deg);
        }

        .corner-tube {
            position: absolute;
            width: 0;
            height: 0;
            transform-style: preserve-3d;
        }

        .tube-tr {
            top: 30px;
            right: 30px;
        }

        .tube-br {
            bottom: 30px;
            right: 30px;
        }

        .tube-bl {
            bottom: 30px;
            left: 30px;
        }

        .tube-tl {
            top: 31px;
            left: 30px;
        }

        .tube-panel {
            position: absolute;
            left: -5px;
            top: -12px;
            width: 8px;
            height: 24px;
            background: #777;
            border-left: 1px solid #777;
            transform-origin: center center;
        }

        .hole {
            width: 12px;
            height: 12px;
            background-color: #000;
            border-radius: 50%;
            box-shadow: inset 2px 2px 4px rgba(255, 255, 255, 0.3);
            position: relative;
            transform-style: preserve-3d;
            z-index: 1;
        }

        .hole.glow-white {
            background-color: #fff;
            box-shadow: 0 0 10px 3px rgba(255, 255, 255, 0.8), inset 2px 2px 4px rgb(255 255 255 / 0.3);
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .pin-hole {
            z-index: 5;
        }

        .pin-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            z-index: 10;
            pointer-events: none;
        }

        .pin {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateZ(0px);
            z-index: 20;
            opacity: 0;
        }

        .pin.pin-visible {
            opacity: 1;
        }

        .pin-cap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #e6b981, #b87333);
            border-radius: 50%;
            transform: translateZ(0);
        }

        .pin-body {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 19px;
            opacity: 0;
            transform-style: preserve-3d;
            transform: translateZ(-0.4px);
        }

        .pin-side {
            position: absolute;
            top: 30%;
            left: calc(50% - 1.5px);
            width: 3px;
            height: 18px;
            background: linear-gradient(180deg, #b87333, #5a3212);
            transform-origin: center top;
            backface-visibility: hidden;
        }

        .pin.pin-body-visible .pin-body {
            opacity: 1;
        }

        .plate.selected .front-face {
            border-color: #66d437;
            box-shadow: inset 0 0 20px rgba(102, 212, 55, 0.3), 0 0 15px rgba(102, 212, 55, 0.5);
        }

        .plate.linked-highlight .front-face {
            border-color: #37a1d4;
            box-shadow: inset 0 0 20px rgba(55, 161, 212, 0.3), 0 0 15px rgba(55, 161, 212, 0.5);
        }

        .plate.linked-highlight-reverse .front-face {
            border-color: #d43737;
            box-shadow: inset 0 0 20px rgba(212, 55, 55, 0.3), 0 0 15px rgba(212, 55, 55, 0.5);
        }

        body.is-zooming .plate .front-face {
            border-color: #999 !important;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9) !important;
            transition: none !important;
        }

        @media (hover: hover) {
            .num-btn:hover, .controls button:hover, #resetBtn:hover {
                background: #444;
            }

            #solveBtn:hover:not(:disabled) {
                background: #ffa600;
            }

            .play-status-row button:hover:not(:disabled), .step-controls-row button:hover:not(:disabled) {
                background: #7aef48;
            }

            .plate.glow:not(.selected, .linked-highlight, .linked-highlight-reverse, .selected-glow):hover .front-face {
                border-color: rgba(255, 255, 255, 0.9);
                transition: border-color 0.1s, box-shadow 0.1s;
            }

            .plate.selected-glow:hover .front-face {
                border-color: #d4d137;
                box-shadow: inset 0 0 20px rgba(212, 209, 55, 0.3), 0 0 15px rgba(212, 204, 55, 0.5);
            }
        }

        .plate.is-touched:not(.selected, .linked-highlight, .linked-highlight-reverse, .selected-glow) .front-face {
            border-color: rgba(255, 255, 255, 0.9);
            transition: border-color 0.05s, box-shadow 0.05s;
        }

        .plate.is-touched.selected-glow .front-face {
            border-color: #d4d137;
            box-shadow: inset 0 0 20px rgba(212, 209, 55, 0.3), 0 0 15px rgba(212, 204, 55, 0.5);
            transition: border-color 0.05s, box-shadow 0.05s;
        }

        .inspector-row {
            display: none;
            flex-direction: row;
            justify-content: space-between;
            flex: 1 1 auto;
            min-width: 0;
        }

        .inspect-btn {
            flex: 1 1 0;
            min-width: 0;
            height: 35px;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 14px;
            white-space: nowrap;
            margin: 0 1px;
            padding: 0;
            touch-action: none;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1;
        }

        .disabled-btn {
            opacity: 0.25;
            background: #111 !important;
            color: #777777 !important;
            border-color: #222 !important;
            pointer-events: none;
        }

        @media screen and (max-width: 768px) {
            #squashLabel, #scaleLabel, #expandBtn, #blockCountContainer .label-text, #countInput {
                display: none !important;
            }

            #blockCountContainer .number-control {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 6px;
                width: 100%;
                flex-wrap: nowrap;
                min-width: 0;
            }

            .num-btn {
                width: 34px;
                flex-grow: 0;
                flex-shrink: 0;
                padding: 0;
                height: 30px;
            }

            #blockCountContainer .number-control > .num-btn {
                width: 34px !important;
                flex: 0 0 34px !important;
                height: 30px !important;
            }

            .inspector-row {
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                gap: 1px;
                flex: 1 1 auto;
                min-width: 0;
                width: auto;
            }

            .inspect-btn {
                flex: 1 1 0;
                min-width: 0;
                height: 30px;
                font-size: 11px;
                white-space: nowrap;
                margin: 0;
                padding: 0 2px;
                touch-action: none;
                box-sizing: border-box;
                display: flex;
                justify-content: center;
                align-items: center;
                line-height: 1;
            }

            body {
                flex-direction: column;
                justify-content: flex-start;
                padding-top: 15vh;
            }

            .scene {
                left: 0 !important;
                top: 8dvh;
                bottom: auto;
                order: 1;
                margin: 0;
            }

            .controls {
                position: absolute;
                top: 65%;
                bottom: auto;
                left: 50%;
                transform: translateX(-50%);
                width: auto;
                max-width: 90%;
                padding: 15px;
                margin: 0;
                z-index: 100;
                box-sizing: border-box;
                font-size: 14px;
            }

            .controls-item {
                margin-bottom: 10px;
            }

            .dynamic-control.show-stretch {
                margin-top: 10px;
                max-height: 200px;
                overflow-y: auto;
            }

            .solution-list {
                padding: 0 !important;
                height: 32px;
                min-height: 32px;
                max-height: 32px !important;
                overflow-y: hidden !important;
                scroll-behavior: smooth;
                border-radius: 8px;
            }

            .solution-list div {
                height: 32px;
                line-height: 32px;
                border-bottom: none !important;
                text-align: center;
                padding: 0 5px !important;
            }

            .controls button, .controls label:not(.toggle-label), #countInput {
                font-size: 14px;
            }
        }

        #nextBtn, #prevBtn {
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        #nextBtn::after, #prevBtn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 0%;
            background: rgba(255, 255, 255, 0.4);
            z-index: -1;
            transition: width 0s linear;
        }

        #nextBtn.is-pressing::after, #prevBtn.is-pressing::after {
            width: 100%;
            transition: width 0.45s linear;
        }

        .tutorial-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: transparent;
            z-index: 999;
            display: none;
        }

        .tutorial-bubble {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 20px 20px;
            border-radius: 8px;
            border: 1px solid #444;
            max-width: 80%;
            text-align: center;
            font-size: 20px;
            line-height: 1.4;
            z-index: 1000;
            display: none;
            pointer-events: none;
        }

        .tutorial-arrow {
            position: absolute;
            color: orange;
            font-size: 24px;
            font-weight: bold;
            display: none;
            z-index: 1000;
            pointer-events: none;
        }

        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            z-index: 1;
        }

        .box40, .question-mark {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 40px;
            width: 40px;
        }

        .box40 svg, .question-mark svg {
            display: block;
            width: 100%;
            height: 100%;
            margin-bottom: 2px;
        }

        .question-mark {
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .question-mark:active {
            transform: scale(0.9);
        }

        .guide-nav {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 10px;
            display: none;
            transition: transform 0.1s ease;
            user-select: none;
            align-items: center;
            justify-content: center;
            height: 40px;
        }

        .guide-nav svg {
            display: block;
        }

        .guide-nav:active {
            transform: scale(0.85);
        }

        .qr {
            width: 40px;
            height: 40px;
            margin: 5px;
        }
    </style>
</head>
<body>
<div class="controls">
    <label class="controls-item" id="scaleLabel">Scale:
        <input id="sizeInput" max="2" min="0.3" step="0.1" type="range" value="1">
    </label>
    <label class="controls-item" for="countInput" id="blockCountContainer">
        <span class="label-text">Amount of Blocks:</span>
        <div class="number-control">
            <button class="num-btn" id="btnDecreaseBlocks">-</button>
            <input id="countInput" max="8" min="3" readonly type="number" value="6">
            <div class="inspector-row" id="inspectorRow"></div>
            <button class="num-btn" id="btnIncreaseBlocks">+</button>
        </div>
    </label>
    <div class="action-row controls-item">
        <button aria-label="Reset" id="resetBtn" title="Reset Lock">&#x21BB;</button>
        <button id="solveBtn">Solve Lock</button>
    </div>
    <label class="toggle-label dynamic-control" id="squashLabel">
        <input checked id="squashMovesCheck" type="checkbox">Squash
    </label>
    <div class="play-status-row dynamic-control">
        <div class="status-message" id="statusMsg"></div>
        <div class="playback-controls">
            <button id="restartSeqBtn" title="Restart Sequence">&#171;</button>
            <button id="playBtn" title="Play Full Solution">▶ Play</button>
        </div>
    </div>
    <div class="step-controls-row dynamic-control" id="stepControlsRow">
        <button id="prevBtn" title="Step Backward">⏮</button>
        <div style="display: flex; flex-direction: column; flex-grow: 1;">
            <div class="solution-list" id="solutionList"></div>
            <button class="expand-list-item" id="expandBtn">▼ Expand Full List ▼</button>
        </div>
        <button id="nextBtn" title="Step Forward">⏭</button>
    </div>
</div>

<div class="scene">
    <div class="lock-mechanism" id="lock"></div>
</div>

<div class="tutorial-overlay" id="tutorialOverlay"></div>
<div class="tutorial-arrow" id="tutorialArrow">↓</div>
<div class="tutorial-bubble" id="tutorialBubble">
    <div id="tutorialText"></div>
</div>

<footer id="footer">
    <button class="guide-nav" id="guidePrev">
        <svg fill="#000000" height="40" viewBox="0 0 24 24" width="40" xmlns="http://www.w3.org/2000/svg">
            <path d="M22,11 H5.41 l5.3,-5.29 A1,1 0 1,0 9.29,4.29 l-7,7 a1,1 0 0,0 0,1.42 l7,7 a1,1 0 0,0 1.42,-1.42 L5.41,13 H22 a1,1 0 0,0 0,-2 Z"/>
        </svg>
    </button>
